    .article-header h1 {

      letter-spacing: 2px;
      line-height: 1.6;

      overflow: hidden;
      box-sizing: border-box;

      height: auto;
      max-height: 480px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: block;
    }
    .article-body {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }
    .article-body h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 48px 0 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gold);
      letter-spacing: 1px;
    }
    .article-body h3 {
      font-size: 18px;
      font-weight: 700;
      margin: 36px 0 12px;
      padding-left: 14px;
      border-left: 3px solid var(--gold);
    }
    .article-body p {
      font-size: 15px;
      line-height: 2.2;
      color: var(--text);
      margin-bottom: 20px;
    }
    .article-body img {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 24px 0;
      display: block;
      object-fit: cover;
    }
    .article-body {
      overflow: hidden;
    }
    .article-body figure {
      margin: 24px 0;
    }
    .article-body figcaption {
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
      margin-top: 8px;
    }
    .article-body ul, .article-body ol {
      padding-left: 24px;
      margin-bottom: 20px;
    }
    .article-body li {
      font-size: 15px;
      line-height: 2;
      color: var(--text);
      margin-bottom: 4px;
      list-style: disc;
    }
    .article-body ol li { list-style: decimal; }
    .article-body blockquote {
      border-left: 3px solid var(--gold);
      padding: 16px 24px;
      background: rgba(200, 168, 124, 0.06);
      border-radius: 0 8px 8px 0;
      margin: 24px 0;
      font-size: 15px;
      color: var(--text);
      line-height: 2;
    }
    .article-body a {
      color: var(--gold);
      text-decoration: underline;
    }
    .article-body a:hover { color: var(--gold-dark); }
    .article-back {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }
    .article-back a {
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 1px;
      transition: color var(--transition);
    }
    .article-back a:hover { color: var(--gold-dark); }
    .article-loading {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 32px;
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
    }
    @media (max-width: 768px) {

      .article-back { padding: 0 20px 60px; }
      .article-hero-image { padding: 0 20px; }

  <script>
    // ★ Sanity設定 — プロジェクトIDを入力
    const SANITY_PROJECT_ID = 'rpqbkqdq';
    const SANITY_DATASET = 'production';
    const SANITY_API_VERSION = '2024-01-01';

    const API_BASE = `https://${SANITY_PROJECT_ID}.api.sanity.io/v${SANITY_API_VERSION}/data/query/${SANITY_DATASET}`;

    function sanityImageUrl(ref, width) {
      if (!ref) return '';
      const [, id, dimensions, format] = ref.split('-');
      return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${id}-${dimensions}.${format}?w=${width || 800}&fit=crop&auto=format`;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    // Portable Text → HTML変換
    function renderPortableText(blocks) {
      if (!blocks || !Array.isArray(blocks)) return '';

      return blocks.map(block => {
        // 画像ブロック
        if (block._type === 'image') {
          const url = sanityImageUrl(block.asset?._ref, 1200);
          const caption = block.caption || '';
          const alt = block.alt || '';
          if (caption) {
            return `<figure><img src="${url}" alt="${alt}"><figcaption>${caption}</figcaption></figure>`;
          }
          return `<img src="${url}" alt="${alt}">`;
        }

        // テキストブロック
        if (block._type !== 'block') return '';

        const style = block.style || 'normal';
        const children = (block.children || []).map(child => {
          let text = child.text || '';
          // HTMLエスケープ
          text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

          // マーク（太字、斜体、リンク）
          if (child.marks && child.marks.length > 0) {
            child.marks.forEach(markKey => {
              if (markKey === 'strong') {
                text = `<strong>${text}</strong>`;
              } else if (markKey === 'em') {
                text = `<em>${text}</em>`;
              } else {
                // アノテーション（リンクなど）
                const annotation = (block.markDefs || []).find(m => m._key === markKey);
                if (annotation && annotation._type === 'link') {
                  text = `<a href="${annotation.href}" target="_blank" rel="noopener noreferrer">${text}</a>`;
                }
              }
            });
          }
          return text;
        }).join('');

        // リストアイテム
        if (block.listItem === 'bullet') {
          return `<li>${children}</li>`;
        }
        if (block.listItem === 'number') {
          return `<li>${children}</li>`;
        }

        // スタイル別タグ
        switch (style) {
          case 'h2': return `<h2>${children}</h2>`;
          case 'h3': return `<h3>${children}</h3>`;
          case 'blockquote': return `<blockquote>${children}</blockquote>`;
          default: return `<p>${children}</p>`;
        }
      }).join('\n')
        // リストアイテムをul/olで囲む（簡易処理）
        .replace(/((?:<li>.*?<\/li>\s*)+)/g, (match) => {
          return `<ul>${match}</ul>`;
        });
    }

    // 記事を取得して表示
    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        document.getElementById('article-title').textContent = '記事が見つかりません';
        document.getElementById('article-body').innerHTML = '<p>URLが正しくありません。</p>';
        return;
      }

      const query = encodeURIComponent(`
        *[_type == "blogPost" && slug.current == "${slug}"][0] {
          title,
          publishedAt,
          "categoryTitle": category->title,
          "imageRef": mainImage.asset._ref,
          "imageAlt": mainImage.alt,
          body[] {
            ...,
            _type == "image" => {
              ...,
              "asset": asset
            }
          }
        }
      `);

      try {
        const res = await fetch(`${API_BASE}?query=${query}`);
        const data = await res.json();
        const post = data.result;

        if (!post) {
          document.getElementById('article-title').textContent = '記事が見つかりません';
          document.getElementById('article-body').innerHTML = '<p>お探しの記事は存在しないか、削除された可能性があります。</p>';
          return;
        }

        // ページタイトル更新
        document.title = `${post.title} | 照株式会社ブログ`;

        // ヘッダー情報
        document.getElementById('article-title').textContent = post.title;
        if (post.publishedAt) {
          document.getElementById('article-date').textContent = formatDate(post.publishedAt);
        }
        if (post.categoryTitle) {
          document.getElementById('article-tag').textContent = post.categoryTitle;
        } else {
          document.getElementById('article-tag').style.display = 'none';
        }

        // メイン画像
        if (post.imageRef) {
          const heroDiv = document.getElementById('article-hero-image');
          heroDiv.style.display = 'block';
          heroDiv.innerHTML = `<img src="${sanityImageUrl(post.imageRef, 1200)}" alt="${post.imageAlt || post.title}">`;
        }

        // 本文
        document.getElementById('article-body').innerHTML = renderPortableText(post.body);

      } catch (err) {
        console.error('Article fetch error:', err);
        document.getElementById('article-body').innerHTML = '<p>記事の読み込みに失敗しました。</p>';
      }
    }

    loadArticle();
  </script>
